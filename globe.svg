<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globeGrad" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%" stop-color="#0E9488"/>
      <stop offset="55%" stop-color="#3E8F6E"/>
      <stop offset="100%" stop-color="#C1440E"/>
    </linearGradient>
    <radialGradient id="shading" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </radialGradient>
    <clipPath id="sphereClip">
      <circle cx="32" cy="32" r="27"/>
    </clipPath>
  </defs>

  <!-- Fond arrondi -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="#0B4A44"/>

  <!-- Sphère -->
  <circle cx="32" cy="32" r="27" fill="url(#globeGrad)"/>

  <!-- Grille lat/long -->
  <g clip-path="url(#sphereClip)" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="1.1">
    <!-- Latitudes -->
    <ellipse cx="32" cy="20" rx="24" ry="5.5"/>
    <ellipse cx="32" cy="32" rx="27" ry="9"/>
    <ellipse cx="32" cy="44" rx="24" ry="5.5"/>
    <!-- Meridiens (differentes phases pour suggerer la rotation) -->
    <ellipse cx="32" cy="32" rx="27" ry="27"/>
    <ellipse cx="32" cy="32" rx="16" ry="27"/>
    <ellipse cx="32" cy="32" rx="4" ry="27"/>
  </g>

  <!-- Relief / ombrage de sphère -->
  <circle cx="32" cy="32" r="27" fill="url(#shading)"/>

  <!-- Contour fin -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#0B4A44" stroke-opacity="0.25" stroke-width="1"/>
</svg>
